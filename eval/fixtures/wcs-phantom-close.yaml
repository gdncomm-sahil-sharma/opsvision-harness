# Question fixtures for the regression-diff harness. Source: the WCS
# phantom-close investigation transcript at Marunda 2026-05-04, plus the
# 224143 single-PP-stuck case the critical-signal inspector targets.
#
# These are NOT expected-answer fixtures — we don't score "is the answer
# correct?". The runner records what the harness DID and the diff tool
# compares it to a prior baseline. Regressions are detected as deltas in
# objectively-observable fields: tools called, references populated,
# self-grade flip, and text-similarity drop on summary.
#
# Each `single` entry runs as an independent chat (fresh chatId).
# `flow` entries chain follow-up turns through one chatId.

