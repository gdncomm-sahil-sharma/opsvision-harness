server:
  port: 8080

spring:
  application:
    name: opsvision-harness
  
  datasource:
    url: jdbc:postgresql://localhost:5432/opsvision
    username: ${DB_USERNAME:opsvision}
    password: ${DB_PASSWORD:opsvision}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 30s
      
  ai:
    # OpenAI Configuration
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4.1-nano}
          temperature: ${OPENAI_TEMPERATURE:0.1}
          max-tokens: ${OPENAI_MAX_TOKENS:2000}
    
    # MCP Client Configuration - Streamable HTTP Transport
    mcp:
      enabled: true
      client:
        enabled: true
        type: SYNC
        request-timeout: 30s
        streamable-http:
          connections:
            opsvision-mcp-server:
              url: "http://localhost:8081/mcp"



app:
  session:
    max-active-per-user: 5
    default-ttl: 4h
  cache:
    tool-results-ttl: 30m

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      mcp-client:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.opsvision.harness: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"