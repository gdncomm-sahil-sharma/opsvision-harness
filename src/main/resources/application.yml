server:
  port: 8080

spring:
  application:
    name: opsvision-harness

  datasource:
    url: jdbc:postgresql://localhost:5432/opsvision
    username: ${DB_USERNAME:opsvision}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      repositories:
        enabled: false
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 30s
      
  ai:
    # OpenAI Configuration
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-5.4-mini}
          temperature: ${OPENAI_TEMPERATURE:0.1}
          max-completion-tokens: ${OPENAI_MAX_TOKENS:2000}
    
    # MCP Client Configuration - Streamable HTTP Transport
    mcp:
      enabled: true
      client:
        enabled: true
        type: SYNC
        request-timeout: 60s
        connection-timeout: 10s
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1s
          multiplier: 2.0
        streamable-http:
          connections:
            opsvision-mcp-server:
              url: "http://localhost:8081/mcp"
              keep-alive: true
              connection-pool-size: 5
              session-timeout: 300s




app:
  session:
    max-active-per-user: 5
    default-ttl: 4h
  cache:
    tool-results-ttl: 30m
  chat:
    memory:
      # Max messages (user + assistant) replayed into the LLM as prior context.
      # Backed by the conversation table — reads survive app restarts.
      max-messages: 20
      # Soft cap on replay context size in tokens (cheap char/4 estimate).
      # When the per-turn cumulative estimate would exceed this, the oldest
      # turns drop until the prefix fits. Bigger than the call's natural
      # context to leave room for the system prompt + tool descriptions +
      # current message.
      max-tokens: 4000
    # OpenAI response_format mode for the final assistant message.
    #   json-object         OpenAI guarantees valid JSON (closes braces);
    #                       no schema enforcement. Default. Eliminates the
    #                       Q8-class missing-brace failure mode.
    #   json-schema-strict  Server-side schema enforcement against
    #                       ChatResponseData. Requires the DTO to be free
    #                       of Map<String,Object> / List<List<Object>>; off
    #                       by default for that reason.
    #   text                No response_format. Falls back to prompt-coaxed
    #                       schema (the M4 baseline). Use if json-object
    #                       causes regressions.
    output-format: json-object
  # Per-model cost rates, USD per 1,000 tokens. Keys are model-id prefixes;
  # longest-prefix-match wins, so versioned model ids (gpt-5.4-mini-2026-04-12)
  # match against gpt-5.4-mini without per-version updates. Missing model ⇒
  # null cost on the conversation row (no rolled-in zero).
  # Source: OpenAI public pricing as of 2026-05.
  #
  # NOTE: Spring Boot's relaxed binder splits dots in property keys into
  # nested map paths, so a key like `gpt-5.4-mini` becomes
  # `gpt-5` → `4-mini` and silently fails to bind. Use `[...]` brackets
  # to keep the literal key intact.
  token-cost:
    rates:
      "[gpt-5.4-mini]":
        input-usd-per-1k: 0.00015
        output-usd-per-1k: 0.0006
      "[gpt-5]":
        input-usd-per-1k: 0.0025
        output-usd-per-1k: 0.01
      "[gpt-4o-mini]":
        input-usd-per-1k: 0.00015
        output-usd-per-1k: 0.0006
      "[gpt-4o]":
        input-usd-per-1k: 0.0025
        output-usd-per-1k: 0.01

# Critical-signal inspector. After every successful MCP tool call, the
# harness inspects the (unwrapped) JSON response. If a rule matches, an
# extra "[CRITICAL SIGNAL — chain required]" text node is appended to
# the result before the LLM sees it — same Loop-1 self-correction
# pattern as the not-found routing hint. Persistence happens BEFORE
# augmentation so the tool_execution audit row stays clean.
#
# A rule fires when EVERY condition matches. Path is a JSON Pointer
# evaluated against the unwrapped MCP payload. Supported matchers per
# condition: exactly one of {equals, empty}.
#   - equals: <scalar>      compare scalar at path; missing path == false-match
#   - empty: true|false     true means: missing OR null OR empty array/object/string
# Question pre-classifier router. Regex rules matched against the user
# message; matching rules' hints are injected as a "[ROUTING HINTS]"
# block prepended to the system prompt for that turn. Input-side
# counterpart to critical-signals (output-side).
question-router:
  rules:
    - id: pp-code-mislabeled-as-pick-list
      pattern: '(?i)\bpick\s+list\s+PK/'
      hint: |
        The message says "pick list" but the trailing identifier is shaped
        like a pick package code (PK/<SITE>-01/<ROMAN>-<YEAR>/<SEQ>). Do
        NOT call getPickList — call diagnosePickPackage with the full
        code. Cite the correction in textResponse.bullets so the user's
        mental model is updated.
    - id: pp-code-detected
      pattern: '\bPK/[A-Z]+-\d+/[IVXLC]+-\d{4}/\d+\b'
      hint: |
        A pick package code is in the message. Primary entry point:
        diagnosePickPackage. The trailing 7-digit segment is a per-PP
        sequence — it is NEVER a pick_list.id.
    - id: picker-code-detected
      pattern: '\bPIC-\d{10}\b'
      hint: |
        A picker code (PIC-NNNNNNNNNN) is in the message. Primary entry
        point: diagnosePickerQueue with pickerCodeOrId set to this exact
        code.
    - id: picker-numeric-id-shorthand
      pattern: '(?i)\bpicker\s+\d{1,8}\b'
      hint: |
        The user wrote "picker N" with a numeric id (the picker_id from
        the DB, not the picker_code). Map it: zero-pad to 10 digits and
        prefix with "PIC-" to form the picker_code (e.g. picker 56108 →
        PIC-0000056108), then call diagnosePickerQueue with that code.
        Don't call getMovementHistory with the bare number — that tool
        does not index by picker_id.
    - id: bulk-pattern-survey
      pattern: '(?i)widespread|same\s+WCS\b|all\s+PPs|other\s+PPs|across\s+\d{4}-\d{2}-\d{2}|how\s+many\s+(?:other|more)'
      hint: |
        Bulk pattern survey. Use findPickingTasks (phantomClose=true for
        WCS-fingerprint scans) or findPickingTaskRequests (status=HOLD
        for stuck-request surveys) with a date window. Report a count
        plus a small sample, never enumerate all rows.
    - id: order-item-id-shape
      pattern: '\b\d{8,10}/\d{1,3}\b'
      hint: |
        An order_item_id (NNNNNNNN/NN shape) is in the message. Start
        with getSalesOrder using orderItemId — its response surfaces
        parentPickPackage.code which you then chain into
        diagnosePickPackage if needed.

critical-signals:
  rules:
    - id: pp-pre-pick-list-no-allocations
      tool: diagnosePickPackage
      when:
        - { path: "/found", equals: true }
        - { path: "/pickListAllocations", empty: true }
        - { path: "/signals/isCanceled", equals: false }
        - { path: "/signals/isRejected", equals: false }
        - { path: "/signals/isInProblemSolve", equals: false }
        - { path: "/signals/isAlreadyAssigned", equals: false }
        - { path: "/signals/isReachedToQc", equals: false }
        - { path: "/signals/isPickingComplete", equals: false }
        - { path: "/signals/isCancellationPending", equals: false }
      hint: |
        [CRITICAL SIGNAL — chain required]
        diagnosePickPackage shows 0 pickListAllocations and no
        terminal / post-pick / problem-solve / already-assigned signals.
        The PP is NOT moving and the diagnose tool cannot see why —
        picking_task_request HOLD lives in the movement DB and is only
        visible via evaluatePickListReadiness (rule no-open-task-requests).
        Before answering, call evaluatePickListReadiness({"idOrCode":"<this PP code>"})
        and report what it shows. The "Stuck-in-HOLD" pattern named in
        your system prompt is the most common cause of this state.

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      mcp-client:
        failure-rate-threshold: 70
        wait-duration-in-open-state: 15s
        sliding-window-size: 20
        minimum-number-of-calls: 3
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 30s
        record-exceptions:
          - org.springframework.ai.tool.execution.ToolExecutionException
          - java.net.SocketException
          - java.net.ConnectException
          - io.modelcontextprotocol.spec.McpTransportSessionNotFoundException
  retry:
    instances:
      mcp-tool:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.ai.tool.execution.ToolExecutionException
          - java.net.SocketException
          - io.modelcontextprotocol.spec.McpTransportSessionNotFoundException

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.opsvision.harness: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [user=%X{userId:-} conv=%X{conversationId:-}] %-5level %logger{30} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [user=%X{userId:-} conv=%X{conversationId:-}] %-5level %logger{36} - %msg%n"