server:
  port: 8080

spring:
  application:
    name: opsvision-harness

  datasource:
    url: jdbc:postgresql://localhost:5432/opsvision
    username: ${DB_USERNAME:opsvision}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      repositories:
        enabled: false
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 30s
      
  ai:
    # OpenAI Configuration
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-5.4-mini}
          temperature: ${OPENAI_TEMPERATURE:0.1}
          max-completion-tokens: ${OPENAI_MAX_TOKENS:2000}
    
    # MCP Client Configuration - Streamable HTTP Transport
    mcp:
      enabled: true
      client:
        enabled: true
        type: SYNC
        request-timeout: 60s
        connection-timeout: 10s
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1s
          multiplier: 2.0
        streamable-http:
          connections:
            opsvision-mcp-server:
              url: "http://localhost:8081/mcp"
              keep-alive: true
              connection-pool-size: 5
              session-timeout: 300s




app:
  session:
    max-active-per-user: 5
    default-ttl: 4h
  cache:
    tool-results-ttl: 30m

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      mcp-client:
        failure-rate-threshold: 70
        wait-duration-in-open-state: 15s
        sliding-window-size: 20
        minimum-number-of-calls: 3
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 30s
        record-exceptions:
          - org.springframework.ai.tool.execution.ToolExecutionException
          - java.net.SocketException
          - java.net.ConnectException
          - io.modelcontextprotocol.spec.McpTransportSessionNotFoundException
  retry:
    instances:
      mcp-tool:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.ai.tool.execution.ToolExecutionException
          - java.net.SocketException
          - io.modelcontextprotocol.spec.McpTransportSessionNotFoundException

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.opsvision.harness: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"