spring:
  application:
    name: opsvision-harness-test
  
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  
  flyway:
    enabled: false
  
  data:
    redis:
      host: localhost
      port: 16379  # Different port for test Redis
      timeout: 1000ms

  ai:
    model:
      chat: google-genai
    google:
      genai:
        api-key: test-key
        chat:
          options:
            model: gemini-2.0-flash-exp
            temperature: 0.0
            max-output-tokens: 1000

mcp:
  base-url: http://localhost:8888  # Mock MCP server for tests
  timeout: 5s
  retry:
    max-attempts: 1  # No retries in tests
    backoff-multiplier: 1

app:
  session:
    max-active-per-user: 3
    default-ttl: 1h
  cache:
    tool-results-ttl: 5m

logging:
  level:
    com.opsvision.harness: DEBUG
    org.springframework.ai: INFO
    org.hibernate: ERROR